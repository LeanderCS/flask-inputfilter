name: Publish to PyPI

on:
  release:
    types: [published]

jobs:
  build:
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest, macos-12]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install build tools
        run: python -m pip install cibuildwheel

      - name: Build wheel with cibuildwheel
        env:
          CIBW_BUILD: "cp37-* cp38-* cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_BEFORE_BUILD: pip install cffi
        run: python -m cibuildwheel --output-dir wheelhouse

      - name: Upload wheels
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}
          path: wheelhouse/

  build-dist-artifacts:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install build tools
        run: pip install build cython

      - name: Compile and Build package
        run: python setup.py sdist

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/

  publish:
    needs:
      - build
      - build-dist-artifacts
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install build tools
        run: |
          pip install build twine wheel cython
          pip install -U packaging

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels-ubuntu-latest

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels-windows-latest

      - name: Download wheels
        uses: actions/download-artifact@v4
        with:
          name: wheels-macos-latest

      - name: Download dist
        uses: actions/download-artifact@v4
        with:
          name: dist

      - name: Compile and Build package
        run: |
          mkdir -p dist
          mv ./*.{tar.gz,whl} dist || true
          
          ls -la dist

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*
