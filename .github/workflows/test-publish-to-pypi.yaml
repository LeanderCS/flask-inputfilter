name: Publish to PyPI

on: [push]

jobs:
  build:
    name: Build wheels on ${{ matrix.os }} (${{ matrix.arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ ubuntu-latest, windows-latest, macos-latest ]
        arch: [ i686, aarch64, ppc64le, s390x, armv7l, ARM64, universal2 ]
        include:
          - os: ubuntu-latest
            arch: i686
          - os: ubuntu-latest
            arch: aarch64
          - os: ubuntu-latest
            arch: ppc64le
          - os: ubuntu-latest
            arch: s390x
          - os: ubuntu-latest
            arch: armv7l
          - os: windows-latest
            arch: ARM64
          - os: macos-latest
            arch: universal2

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install cross-compilers (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc-multilib g++-multilib \
            gcc-aarch64-linux-gnu g++-aarch64-linux-gnu \
            gcc-arm-linux-gnueabihf g++-arm-linux-gnueabihf \
            gcc-powerpc64le-linux-gnu g++-powerpc64le-linux-gnu \
            gcc-s390x-linux-gnu g++-s390x-linux-gnu

      - name: Install cibuildwheel
        run: python -m pip install --upgrade cibuildwheel

      - name: Build wheel with cibuildwheel
        env:
          CIBW_BUILD: "cp37-* cp38-* cp39-* cp310-* cp311-* cp312-* cp313-* cp314-*"
          CIBW_ARCHS: "auto"
          CIBW_JOBS: 4
          CIBW_BEFORE_BUILD: pip install cffi
        run: cibuildwheel --output-dir wheelhouse

      - name: Upload wheelhouse
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.os }}-${{ matrix.arch }}
          path: wheelhouse/*.whl

  publish:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: 3.11

      - name: Install build tools
        run: |
          python -m pip install build cython twine wheel
          pip install -U packaging

      - name: Compile and Build package
        run: python setup.py sdist --dist-dir dist/

      - name: Upload dist
        uses: actions/upload-artifact@v4
        with:
          name: dist
          path: dist/
